background_opacity: 1.0

font:
  normal:
    family: Inconsolata Regular Nerd Font Complete Mono
    style: Regular
  bold:
    family: Inconsolata Bold Nerd Font Complete Mono
    style: Bold
  italic:
    family: Inconsolata Regular Nerd Font Complete Mono
    style: Italic
  bold_italic:
    family: Inconsolata Regular Nerd Font Complete Mono
    style: Bold Italic
  size: 12.0

live_config_reload: true

save_to_clipboard: true

window:
  dimensions:
    columns: 300
    lines: 100

  position:
    x: 0
    y: 0

  padding:
    x: 5
    y: 5
